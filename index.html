<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Player</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .player-container {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 30px;
      max-width: 400px;
      width: 100%;
    }

    .disc-container {
      position: relative;
      width: 250px;
      height: 250px;
      margin: 0 auto 30px;
    }

    .disc-image {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      transition: transform 0.3s ease;
    }

    .disc-image.playing {
      animation: rotate 10s linear infinite;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .song-info {
      text-align: center;
      margin-bottom: 25px;
    }

    .song-title {
      font-size: 24px;
      font-weight: bold;
      color: #333;
      margin-bottom: 8px;
    }

    .song-artist {
      font-size: 16px;
      color: #666;
    }

    .progress-container {
      margin-bottom: 20px;
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: #ddd;
      border-radius: 10px;
      cursor: pointer;
      position: relative;
      margin-bottom: 10px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      border-radius: 10px;
      width: 0%;
      transition: width 0.1s linear;
    }

    .progress-bar.seeking .progress-fill {
      transition: none;
    }

    .time-info {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #666;
    }

    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-bottom: 25px;
    }

    .control-btn {
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      color: white;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }

    .control-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
    }

    .control-btn:active {
      transform: scale(0.95);
    }

    .play-btn {
      width: 60px;
      height: 60px;
      font-size: 24px;
    }

    .playlist {
      max-height: 300px;
      overflow-y: auto;
      margin-top: 20px;
      border-top: 2px solid #eee;
      padding-top: 15px;
    }

    .playlist-item {
      display: flex;
      align-items: center;
      padding: 12px;
      cursor: pointer;
      border-radius: 10px;
      transition: background 0.3s;
      margin-bottom: 8px;
    }

    .playlist-item:hover {
      background: rgba(102, 126, 234, 0.1);
    }

    .playlist-item.active {
      background: rgba(102, 126, 234, 0.2);
    }

    .playlist-item img {
      width: 50px;
      height: 50px;
      border-radius: 8px;
      object-fit: cover;
      margin-left: 12px;
    }

    .playlist-item-info {
      flex: 1;
      text-align: right;
    }

    .playlist-item-title {
      font-weight: bold;
      color: #333;
      margin-bottom: 4px;
    }

    .playlist-item-artist {
      font-size: 12px;
      color: #666;
    }

    .playlist::-webkit-scrollbar {
      width: 6px;
    }

    .playlist::-webkit-scrollbar-track {
      background: #f1f1f1;
      border-radius: 10px;
    }

    .playlist::-webkit-scrollbar-thumb {
      background: #667eea;
      border-radius: 10px;
    }

    .volume-control {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 20px;
      padding-top: 15px;
      border-top: 2px solid #eee;
    }

    .volume-icon {
      color: #667eea;
      font-size: 20px;
    }

    .volume-slider {
      flex: 1;
      height: 6px;
      border-radius: 10px;
      background: #ddd;
      outline: none;
      -webkit-appearance: none;
    }

    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      cursor: pointer;
    }

    .volume-slider::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      cursor: pointer;
      border: none;
    }
  </style>
</head>
<body>
  <div class="player-container">
    <div class="disc-container">
      <img src="https://i.top4top.io/p_3786t29bt1.jpg" alt="Album Art" class="disc-image" id="discImage">
    </div>

    <div class="song-info">
      <div class="song-title" id="songTitle">Senorita</div>
      <div class="song-artist" id="songArtist">Unknown Artist</div>
    </div>

    <div class="progress-container">
      <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="time-info">
        <span id="currentTime">0:00</span>
        <span id="duration">0:00</span>
      </div>
    </div>

    <div class="controls">
      <button class="control-btn" id="prevBtn">⏮</button>
      <button class="control-btn play-btn" id="playBtn">▶</button>
      <button class="control-btn" id="nextBtn">⏭</button>
    </div>

    <div class="volume-control">
      <span class="volume-icon">🔊</span>
      <input type="range" min="0" max="100" value="100" class="volume-slider" id="volumeSlider">
    </div>

    <div class="playlist" id="playlist"></div>
  </div>

  <audio id="audio"></audio>

  <script>
    // ===== PLAYLIST DATA =====
    const playlist = [
      {
        title: 'Senorita',
        artist: 'Unknown Artist',
        src: 'https://e.top4top.io/m_3786pdta51.m4a',
        cover: 'https://i.top4top.io/p_3786t29bt1.jpg',
        volume: 1.0
      },
      {
        title: 'Someone else',
        artist: 'Unknown Artist',
        src: 'https://k.top4top.io/m_37862017p1.m4a',
        cover: 'https://h.top4top.io/p_3786mfd6r1.jpg',
        volume: 1.0
      },
      {
        title: 'TANAKA',
        artist: 'Unknown Artist',
        src: 'https://j.top4top.io/m_3786guoxr1.m4a',
        cover: 'https://f.top4top.io/p_3786wcf291.jpg',
        volume: 1.5
      },
      {
        title: 'I like this',
        artist: 'Unknown Artist',
        src: 'https://c.top4top.io/m_3786b9zjy1.m4a',
        cover: 'https://l.top4top.io/p_3786zb6561.jpg',
        volume: 1.0
      }
    ];

    let currentTrackIndex = 0;

    // ===== DOM ELEMENTS =====
    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('playBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const currentTimeEl = document.getElementById('currentTime');
    const durationEl = document.getElementById('duration');
    const discImage = document.getElementById('discImage');
    const songTitle = document.getElementById('songTitle');
    const songArtist = document.getElementById('songArtist');
    const playlistContainer = document.getElementById('playlist');
    const volumeSlider = document.getElementById('volumeSlider');

    let isSeeking = false;

    // ===== LOAD TRACK =====
    function loadTrack(index) {
      currentTrackIndex = index;
      const track = playlist[index];
      
      audio.src = track.src;
      audio.volume = track.volume;
      discImage.src = track.cover;
      songTitle.textContent = track.title;
      songArtist.textContent = track.artist;
      
      updatePlaylistUI();
      audio.load();
    }

    // ===== UPDATE PLAYLIST UI =====
    function updatePlaylistUI() {
      playlistContainer.innerHTML = '';
      playlist.forEach((track, index) => {
        const item = document.createElement('div');
        item.className = 'playlist-item' + (index === currentTrackIndex ? ' active' : '');
        item.innerHTML = `
          <img src="${track.cover}" alt="${track.title}">
          <div class="playlist-item-info">
            <div class="playlist-item-title">${track.title}</div>
            <div class="playlist-item-artist">${track.artist}</div>
          </div>
        `;
        item.addEventListener('click', () => {
          loadTrack(index);
          togglePlay();
        });
        playlistContainer.appendChild(item);
      });
    }

    // ===== PLAY/PAUSE =====
    function togglePlay() {
      if (audio.paused) {
        audio.play();
        playBtn.textContent = '⏸';
        discImage.classList.add('playing');
        playClickSound();
      } else {
        audio.pause();
        playBtn.textContent = '▶';
        discImage.classList.remove('playing');
      }
    }

    playBtn.addEventListener('click', togglePlay);

    // ===== PREVIOUS/NEXT =====
    prevBtn.addEventListener('click', () => {
      currentTrackIndex = (currentTrackIndex - 1 + playlist.length) % playlist.length;
      loadTrack(currentTrackIndex);
      audio.play();
      playBtn.textContent = '⏸';
      discImage.classList.add('playing');
      playClickSound();
    });

    nextBtn.addEventListener('click', () => {
      currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
      loadTrack(currentTrackIndex);
      audio.play();
      playBtn.textContent = '⏸';
      discImage.classList.add('playing');
      playClickSound();
    });

    // ===== AUTO NEXT =====
    audio.addEventListener('ended', () => {
      currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
      loadTrack(currentTrackIndex);
      audio.play();
    });

    // ===== VOLUME CONTROL =====
    volumeSlider.addEventListener('input', (e) => {
      const volume = e.target.value / 100;
      const track = playlist[currentTrackIndex];
      audio.volume = volume * track.volume;
    });

    // ===== TIME UPDATE =====
    audio.addEventListener('timeupdate', () => {
      if (!isSeeking && audio.duration) {
        const pct = (audio.currentTime / audio.duration) * 100;
        progressFill.style.width = pct + '%';
        currentTimeEl.textContent = formatTime(audio.currentTime);
      }
    });

    audio.addEventListener('loadedmetadata', () => {
      durationEl.textContent = formatTime(audio.duration);
    });

    function formatTime(seconds) {
      if (isNaN(seconds)) return '0:00';
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${mins}:${secs.toString().padStart(2, '0')}`;
    }

    // ===== PROGRESS BAR CLICK =====
    progressBar.addEventListener('click', (e) => {
      const rect = progressBar.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const pct = Math.max(0, Math.min(1, x / rect.width));
      audio.currentTime = pct * audio.duration;
      progressFill.style.width = (pct * 100) + '%';
    });

    // ===== TOUCH EVENTS =====
    progressBar.addEventListener('touchstart', function(e) {
      isSeeking = true;
      progressBar.classList.add('seeking');
      const touch = e.touches[0];
      const rect = progressBar.getBoundingClientRect();
      const x = touch.clientX - rect.left;
      const pct = Math.max(0, Math.min(1, x / rect.width));
      audio.currentTime = pct * audio.duration;
      progressFill.style.width = (pct * 100) + '%';
      
      function onTouchMove(e) {
        const touch = e.touches[0];
        const rect = progressBar.getBoundingClientRect();
        const x = touch.clientX - rect.left;
        const pct = Math.max(0, Math.min(1, x / rect.width));
        audio.currentTime = pct * audio.duration;
        progressFill.style.width = (pct * 100) + '%';
        currentTimeEl.textContent = formatTime(audio.currentTime);
      }
      
      function onTouchEnd() {
        isSeeking = false;
        progressBar.classList.remove('seeking');
        document.removeEventListener('touchmove', onTouchMove);
        document.removeEventListener('touchend', onTouchEnd);
      }
      
      document.addEventListener('touchmove', onTouchMove);
      document.addEventListener('touchend', onTouchEnd);
    });

    // ===== CLICK SOUND =====
    function playClickSound() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = ctx.createOscillator();
        const gain = ctx.createGain();

        oscillator.type = 'square';
        oscillator.frequency.setValueAtTime(800, ctx.currentTime);
        oscillator.frequency.exponentialRampToValueAtTime(400, ctx.currentTime + 0.06);

        gain.gain.setValueAtTime(0.08, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.06);

        oscillator.connect(gain);
        gain.connect(ctx.destination);

        oscillator.start(ctx.currentTime);
        oscillator.stop(ctx.currentTime + 0.06);

        setTimeout(() => ctx.close(), 200);
      } catch(e) {
        // Silent fail
      }
    }

    // ===== KEYBOARD SUPPORT =====
    document.addEventListener('keydown', function(e) {
      if (e.code === 'Space' && e.target === document.body) {
        e.preventDefault();
        togglePlay();
      }
      if (e.code === 'ArrowRight') {
        audio.currentTime = Math.min(audio.currentTime + 5, audio.duration || 0);
      }
      if (e.code === 'ArrowLeft') {
        audio.currentTime = Math.max(audio.currentTime - 5, 0);
      }
    });

    // ===== INITIALIZE =====
    discImage.style.animation = 'none';
    loadTrack(0);
    updatePlaylistUI();

  </script>
</body>
</html>
